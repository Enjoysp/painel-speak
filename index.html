<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel do Professor — Inglês</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --tint:#1F7A8C; --tint-dp:#155e6e; --bg:#F4F6F7; --ink:#23303a;
    --verde:#2BB673; --amarelo:#E8A93C; --vermelho:#E1574C;
    --linha:#e1e5e8; --card:#fff;
  }
  body{ font-family:"Segoe UI",-apple-system,system-ui,Arial,sans-serif;
    background:var(--bg); color:var(--ink); padding:16px; }
  .wrap{ max-width:1120px; margin:0 auto; }
  h1{ font-size:23px; color:var(--tint-dp); }
  .sub{ color:#6b7780; font-size:13px; margin-top:2px; }
  .barra{ background:var(--card); border-radius:13px; padding:12px 14px; margin:12px 0;
    box-shadow:0 2px 8px rgba(0,0,0,.06); display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  select,input,textarea{ font-family:inherit; font-size:14px; padding:8px 10px;
    border:1.5px solid #d4dade; border-radius:8px; }
  select{ min-width:160px; } textarea{ width:100%; resize:vertical; min-height:60px; }
  .btn{ border:none; border-radius:8px; font-weight:700; font-size:13px; padding:9px 14px;
    color:#fff; cursor:pointer; background:var(--tint); }
  .btn:hover{ background:var(--tint-dp); }
  .btn.cinza{ background:#7d8a92; } .btn.cinza:hover{ background:#67737a; }
  .salvo{ font-size:12px; color:#8a949b; margin-left:auto; }
  .sep{ width:1px; height:24px; background:var(--linha); }
  .abas{ display:flex; gap:6px; flex-wrap:wrap; margin:6px 0 12px; }
  .aba{ background:#e7edee; color:#5a6b73; border:none; border-radius:9px 9px 0 0;
    padding:11px 16px; font-size:14px; font-weight:700; cursor:pointer; }
  .aba.ativa{ background:var(--card); color:var(--tint-dp); box-shadow:0 -2px 6px rgba(0,0,0,.05); }
  .painel{ background:var(--card); border-radius:0 13px 13px 13px; padding:16px;
    box-shadow:0 2px 8px rgba(0,0,0,.06); }
  .subbar{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-bottom:14px;
    padding-bottom:12px; border-bottom:1px solid var(--linha); }
  .resumo{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  .pill{ background:#f4f7f8; border-radius:10px; padding:8px 13px; font-size:13px;
    display:flex; gap:7px; align-items:center; }
  .pill b{ font-size:15px; }
  .dot{ width:11px; height:11px; border-radius:50%; display:inline-block; }
  .dot.v{ background:var(--verde);} .dot.a{ background:var(--amarelo);} .dot.r{ background:var(--vermelho);}
  .tabelaWrap{ overflow:auto; max-height:58vh; border:1px solid var(--linha); border-radius:10px; }
  table{ border-collapse:separate; border-spacing:0; width:100%; }
  th,td{ border-bottom:1px solid var(--linha); border-right:1px solid var(--linha); padding:0; text-align:center; font-size:13px; }
  thead th{ position:sticky; top:0; z-index:3; background:#eef3f4; color:var(--tint-dp);
    font-weight:700; padding:9px 7px; min-width:66px; white-space:nowrap; }
  thead th .x,.nomeAluno .x{ cursor:pointer; color:#bcc6cb; font-weight:700; margin-left:4px; }
  thead th .x:hover,.nomeAluno .x:hover{ color:var(--vermelho); }
  .colAluno{ position:sticky; left:0; z-index:2; background:var(--card); text-align:left;
    padding:9px 11px; min-width:170px; font-weight:600; }
  thead .colAluno{ z-index:5; background:#eef3f4; }
  .colFim{ position:sticky; right:0; z-index:2; background:var(--card); min-width:112px; }
  thead .colFim{ z-index:5; background:#eef3f4; }
  tbody tr:hover td,tbody tr:hover .colAluno{ background:#f7fbfb; }
  .nomeAluno{ display:flex; justify-content:space-between; align-items:center; gap:6px; }
  .cel{ width:100%; height:42px; cursor:pointer; font-size:17px; font-weight:800;
    display:flex; align-items:center; justify-content:center; user-select:none; }
  .s0{ color:#c2cacf; } .s1{ background:rgba(43,182,115,.16); color:var(--verde); }
  .s2{ background:rgba(232,169,60,.18); color:var(--amarelo); }
  .s3{ background:rgba(225,87,76,.15); color:var(--vermelho); }
  .badge{ display:inline-block; font-weight:700; font-size:12px; padding:4px 9px; border-radius:18px; }
  .badge.v{ background:rgba(43,182,115,.16); color:#1c7a4e; }
  .badge.a{ background:rgba(232,169,60,.2); color:#9a6a12; }
  .badge.r{ background:rgba(225,87,76,.16); color:#a83228; }
  .badge.n{ background:#eef1f3; color:#8a949b; }
  .pct{ font-size:10px; color:#8a949b; display:block; margin-top:2px; }
  .legenda{ font-size:12px; color:#6b7780; display:flex; gap:14px; flex-wrap:wrap; margin-top:10px; align-items:center; }
  .legenda span{ display:flex; align-items:center; gap:5px; }
  .qd{ width:14px; height:14px; border-radius:4px; display:inline-block; }
  .vazio{ padding:34px; text-align:center; color:#6b7780; }
  .vazio h3{ color:var(--tint-dp); margin-bottom:8px; }
  .notas{ display:flex; flex-direction:column; gap:8px; margin-top:12px; }
  .nota{ display:flex; gap:10px; align-items:flex-start; background:#f6f8f9; border-radius:9px;
    padding:10px 12px; border-left:5px solid #ccc; }
  .nota.positivo{ border-color:var(--verde); } .nota.atencao{ border-color:var(--amarelo); }
  .nota.negativo{ border-color:var(--vermelho); }
  .nota .data{ font-size:12px; color:#8a949b; min-width:78px; }
  .nota .txt{ flex:1; font-size:14px; }
  .nota .rem{ cursor:pointer; color:#c2cacf; font-weight:700; }
  .nota .rem:hover{ color:var(--vermelho); }
  .boletim{ border:1px solid var(--linha); border-radius:12px; padding:26px; margin-top:14px; }
  .boletim h2{ color:var(--tint-dp); font-size:22px; }
  .boletim .meta{ color:#6b7780; font-size:13px; margin:4px 0 16px; }
  .boletim .bloco{ margin:16px 0; }
  .boletim .bloco h4{ font-size:15px; color:var(--tint-dp); border-bottom:2px solid var(--linha);
    padding-bottom:5px; margin-bottom:10px; }
  .miniTab{ width:100%; border-collapse:collapse; font-size:13px; }
  .miniTab td{ border:1px solid var(--linha); padding:6px 9px; text-align:left; }
  .assinatura{ margin-top:36px; display:flex; justify-content:space-between; gap:30px; }
  .assinatura div{ flex:1; border-top:1.5px solid #999; padding-top:6px; font-size:13px; color:#666; text-align:center; }
  @media print{
    body{ background:#fff; padding:0; }
    .noprint{ display:none !important; }
    .sec{ display:none !important; }
    #sec-boletim{ display:block !important; }
    .boletim{ border:none; page-break-after:always; }
    .boletim:last-child{ page-break-after:auto; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>&#128203; Painel do Professor &#8212; Inglês</h1>
  <div class="sub noprint">Desempenho · Frequência · Evolução · Comportamento · Boletim. Salva sozinho neste navegador.</div>
  <div class="barra noprint">
    <label style="font-weight:700;font-size:13px">Turma:</label>
    <select id="selTurma" onchange="trocarTurma(this.value)"></select>
    <input id="novaTurma" placeholder="Ex: Inglês 6º A" style="min-width:140px" onkeydown="if(event.key==='Enter')addTurma()">
    <button class="btn" onclick="addTurma()">+ Turma</button>
    <button class="btn cinza" id="btnDelTurma" onclick="delTurma()">&#128465; Excluir</button>
    <div class="sep"></div>
    <input id="profNome" placeholder="Professor(a)" style="min-width:150px" oninput="setProf(this.value)">
    <span class="salvo" id="salvo"></span>
  </div>
  <div class="barra noprint" style="margin-top:-4px">
    <button class="btn cinza" onclick="baixarBackup()">&#128190; Baixar backup</button>
    <button class="btn cinza" onclick="document.getElementById('arq').click()">&#128194; Abrir backup</button>
    <input type="file" id="arq" accept=".json" style="display:none" onchange="abrirBackup(event)">
  </div>
  <div class="abas noprint">
    <button class="aba" data-tab="licoes"        onclick="irAba('licoes')">&#128218; Lições</button>
    <button class="aba" data-tab="frequencia"    onclick="irAba('frequencia')">&#128197; Frequência</button>
    <button class="aba" data-tab="evolucao"      onclick="irAba('evolucao')">&#128200; Evolução</button>
    <button class="aba" data-tab="comportamento" onclick="irAba('comportamento')">&#11088; Comportamento</button>
    <button class="aba" data-tab="boletim"       onclick="irAba('boletim')">&#128424;&#65039; Boletim</button>
  </div>
  <div class="sec painel" id="sec-licoes"></div>
  <div class="sec painel" id="sec-frequencia"></div>
  <div class="sec painel" id="sec-evolucao"></div>
  <div class="sec painel" id="sec-comportamento"></div>
  <div class="sec" id="sec-boletim"></div>
</div>
<script>
var dados = { turmas:[], atual:null, professor:'' };
var ui = { tab:'licoes', evoAluno:null, compAluno:null, boletimAluno:'__todos__' };
var SD=['','\u2713','\u25d0','\u2715'];
var SP=['','P','F','A'];
var SCORE={1:100,2:50,3:0};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function T(){ return dados.turmas.find(function(t){return t.id===dados.atual;})||null; }
function hoje(){ try{ return new Date().toLocaleDateString('pt-BR'); }catch(e){ return ''; } }

async function salvar(){
  var j=JSON.stringify(dados);
  try{ localStorage.setItem('painel_prof_ingles',j); }catch(e){}
  var s=document.getElementById('salvo'); s.textContent='\u2713 salvo';
  clearTimeout(window._t); window._t=setTimeout(function(){s.textContent='';},1400);
}

async function carregar(){
  var j=null;
  try{ j=localStorage.getItem('painel_prof_ingles'); }catch(e){}
  if(j){ try{ dados=JSON.parse(j); }catch(e){} }
  if(!dados.turmas) dados.turmas=[];
  if(dados.professor==null) dados.professor='';
  if(dados.atual==null&&dados.turmas.length) dados.atual=dados.turmas[0].id;
}

function migra(t){ t.alunos=t.alunos||[]; t.licoes=t.licoes||[]; t.datas=t.datas||[];
  t.desempenho=t.desempenho||{}; t.presenca=t.presenca||{}; t.comportamento=t.comportamento||{}; return t; }

function addTurma(){
  var i=document.getElementById('novaTurma'); var n=i.value.trim(); if(!n)return;
  var t=migra({id:uid(),nome:n}); dados.turmas.push(t); dados.atual=t.id; i.value='';
  render(); salvar();
}
function trocarTurma(id){ dados.atual=id; ui.evoAluno=ui.compAluno=null; ui.boletimAluno='__todos__'; render(); salvar(); }
function delTurma(){ var t=T(); if(!t)return; if(!confirm('Excluir a turma "'+t.nome+'" e tudo dela?'))return;
  dados.turmas=dados.turmas.filter(function(x){return x.id!==t.id;}); dados.atual=dados.turmas.length?dados.turmas[0].id:null; render(); salvar(); }
function setProf(v){ dados.professor=v; clearTimeout(window._p); window._p=setTimeout(salvar,500); }

function addAlunoFrom(inputId){
  var t=T(); if(!t){ alert('Crie uma turma primeiro.'); return; }
  var i=document.getElementById(inputId);
  i.value.split(/[,\n;]+/).map(function(s){return s.trim();}).filter(Boolean).forEach(function(n){t.alunos.push({id:uid(),nome:n});});
  i.value=''; render(); salvar();
}
function delAluno(id){ var t=T(); if(!confirm('Remover este aluno?'))return;
  t.alunos=t.alunos.filter(function(a){return a.id!==id;}); delete t.desempenho[id]; delete t.presenca[id]; delete t.comportamento[id];
  render(); salvar(); }
function addLicao(){ var t=T(); var i=document.getElementById('novaLicao');
  i.value.split(/[,\n;]+/).map(function(s){return s.trim();}).filter(Boolean).forEach(function(n){t.licoes.push({id:uid(),nome:n});});
  i.value=''; render(); salvar(); }
function delLicao(id){ var t=T(); if(!confirm('Remover esta li\u00e7\u00e3o?'))return;
  t.licoes=t.licoes.filter(function(x){return x.id!==id;}); for(var a in t.desempenho){ if(t.desempenho[a])delete t.desempenho[a][id]; }
  render(); salvar(); }
function addDataHoje(){ var t=T(); t.datas.push({id:uid(),rotulo:hoje()}); render(); salvar(); }
function addDataCustom(){ var t=T(); var i=document.getElementById('novaData'); var v=i.value.trim();
  if(v){ t.datas.push({id:uid(),rotulo:v}); i.value=''; render(); salvar(); } }
function delData(id){ var t=T(); if(!confirm('Remover esta aula?'))return;
  t.datas=t.datas.filter(function(x){return x.id!==id;}); for(var a in t.presenca){ if(t.presenca[a])delete t.presenca[a][id]; }
  render(); salvar(); }
function cicloD(al,li){ var t=T(); if(!t.desempenho[al])t.desempenho[al]={};
  t.desempenho[al][li]=((t.desempenho[al][li]||0)+1)%4; render(); salvar(); }
function cicloP(al,da){ var t=T(); if(!t.presenca[al])t.presenca[al]={};
  t.presenca[al][da]=((t.presenca[al][da]||0)+1)%4; render(); salvar(); }

function aproveitamento(t,al){
  var tot=t.licoes.length; if(!tot)return{pct:null};
  var s=0; t.licoes.forEach(function(l){ var v=(t.desempenho[al]||{})[l.id]||0; if(v===1)s+=1; else if(v===2)s+=.5; });
  var pct=Math.round(s/tot*100); var cls='r',txt='Atrasado';
  if(pct>=80){cls='v';txt='Em dia';} else if(pct>=40){cls='a';txt='Aten\u00e7\u00e3o';}
  return{pct:pct,cls:cls,txt:txt};
}
function freq(t,al){
  var p=0,f=0,a=0; t.datas.forEach(function(d){ var v=(t.presenca[al]||{})[d.id]||0; if(v===1)p++; else if(v===2)f++; else if(v===3)a++; });
  var reg=p+f+a; var pct=reg?Math.round((p+a)/reg*100):null;
  return{p:p,f:f,a:a,reg:reg,pct:pct};
}

function irAba(tab){ ui.tab=tab; render(); }

function render(){
  var sel=document.getElementById('selTurma'); sel.innerHTML='';
  dados.turmas.forEach(function(t){ var o=document.createElement('option'); o.value=t.id; o.textContent=t.nome;
    if(t.id===dados.atual)o.selected=true; sel.appendChild(o); });
  document.getElementById('profNome').value=dados.professor||'';
  document.getElementById('btnDelTurma').style.display=T()?'inline-block':'none';
  document.querySelectorAll('.aba').forEach(function(b){b.classList.toggle('ativa', b.dataset.tab===ui.tab);});
  document.querySelectorAll('.sec').forEach(function(s){s.style.display='none';});
  var sec=document.getElementById('sec-'+ui.tab); if(sec)sec.style.display='block';
  var t=T();
  if(!t){ mostrarVazioTodas('<h3>Crie sua turma \u2191</h3><p>Digite o nome l\u00e1 em cima e clique em <b>+ Turma</b>.</p>'); return; }
  t.alunos=t.alunos||[];
  renderLicoes(t); renderFrequencia(t); renderEvolucao(t); renderComportamento(t); renderBoletim(t);
}

function mostrarVazioTodas(html){
  ['licoes','frequencia','evolucao','comportamento'].forEach(function(s){
    document.getElementById('sec-'+s).innerHTML='<div class="vazio">'+html+'</div>'; });
  document.getElementById('sec-boletim').innerHTML='';
}

function rosterAddHTML(inputId){
  return '<input id="'+inputId+'" placeholder="Nome do aluno (cole v\u00e1rios com v\u00edrgula)" style="min-width:280px" onkeydown="if(event.key==='Enter')addAlunoFrom(''+inputId+'')">'
    +'<button class="btn" onclick="addAlunoFrom(''+inputId+'')">+ Aluno</button>';
}

function vazioAlunos(){ return '<div class="vazio"><h3>Adicione os alunos \u2191</h3><p>Pode colar a turma toda de uma vez, separando por v\u00edrgula.</p></div>'; }

function renderLicoes(t){
  var el=document.getElementById('sec-licoes');
  var h='<div class="subbar">'+rosterAddHTML('novoAluno')+'<div class="sep"></div>'
    +'<input id="novaLicao" placeholder="Li\u00e7\u00e3o (ex: Unidade 1)" onkeydown="if(event.key==='Enter')addLicao()">'
    +'<button class="btn" onclick="addLicao()">+ Li\u00e7\u00e3o</button></div>';
  if(!t.alunos.length){ el.innerHTML=h+vazioAlunos(); return; }
  var v=0,a=0,r=0; t.alunos.forEach(function(al){ var e=aproveitamento(t,al.id); if(e.pct!=null){ if(e.cls==='v')v++; else if(e.cls==='a')a++; else r++; } });
  if(t.licoes.length) h+='<div class="resumo"><div class="pill"><span class="dot v"></span>Em dia <b>'+v+'</b></div>'
    +'<div class="pill"><span class="dot a"></span>Aten\u00e7\u00e3o <b>'+a+'</b></div>'
    +'<div class="pill"><span class="dot r"></span>Atrasados <b>'+r+'</b></div>'
    +'<div class="pill">&#128101; <b>'+t.alunos.length+'</b></div></div>';
  h+='<div class="tabelaWrap"><table><thead><tr><th class="colAluno">Aluno</th>';
  t.licoes.forEach(function(l){ h+='<th>'+l.nome+'<span class="x" onclick="delLicao(''+l.id+'')">\u2715</span></th>'; });
  h+='<th class="colFim">Situa\u00e7\u00e3o</th></tr></thead><tbody>';
  t.alunos.forEach(function(al){
    h+='<tr><td class="colAluno"><div class="nomeAluno"><span>'+al.nome+'</span><span class="x" onclick="delAluno(''+al.id+'')">\u2715</span></div></td>';
    t.licoes.forEach(function(l){ var x=(t.desempenho[al.id]||{})[l.id]||0;
      h+='<td><div class="cel s'+x+'" onclick="cicloD(''+al.id+'',''+l.id+'')">'+SD[x]+'</div></td>'; });
    var e=aproveitamento(t,al.id);
    h+= e.pct==null ? '<td class="colFim"><span class="badge n">sem li\u00e7\u00f5es</span></td>'
      : '<td class="colFim"><span class="badge '+e.cls+'">'+e.txt+'</span><span class="pct">'+e.pct+'%</span></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  h+='<div class="legenda"><b>Legenda:</b>'
    +'<span><span class="qd" style="background:rgba(43,182,115,.4)"></span>\u2713 Concluiu</span>'
    +'<span><span class="qd" style="background:rgba(232,169,60,.4)"></span>\u25d0 Em parte</span>'
    +'<span><span class="qd" style="background:rgba(225,87,76,.35)"></span>\u2715 N\u00e3o fez</span>'
    +'<span style="color:#9aa3a9">Clique pra mudar.</span></div>';
  el.innerHTML=h;
}

function renderFrequencia(t){
  var el=document.getElementById('sec-frequencia');
  var h='<div class="subbar">'+rosterAddHTML('novoAlunoF')+'<div class="sep"></div>'
    +'<button class="btn" onclick="addDataHoje()">+ Aula de hoje ('+hoje()+')</button>'
    +'<input id="novaData" placeholder="ou data: 12/06" style="min-width:120px" onkeydown="if(event.key==='Enter')addDataCustom()">'
    +'<button class="btn cinza" onclick="addDataCustom()">+</button></div>';
  if(!t.alunos.length){ el.innerHTML=h+vazioAlunos(); return; }
  h+='<div class="tabelaWrap"><table><thead><tr><th class="colAluno">Aluno</th>';
  t.datas.forEach(function(d){ h+='<th>'+d.rotulo+'<span class="x" onclick="delData(''+d.id+'')">\u2715</span></th>'; });
  h+='<th class="colFim">Frequ\u00eancia</th></tr></thead><tbody>';
  t.alunos.forEach(function(al){
    h+='<tr><td class="colAluno"><div class="nomeAluno"><span>'+al.nome+'</span><span class="x" onclick="delAluno(''+al.id+'')">\u2715</span></div></td>';
    t.datas.forEach(function(d){ var x=(t.presenca[al.id]||{})[d.id]||0;
      h+='<td><div class="cel s'+x+'" onclick="cicloP(''+al.id+'',''+d.id+'')">'+SP[x]+'</div></td>'; });
    var f=freq(t,al.id);
    h+= f.pct==null ? '<td class="colFim"><span class="badge n">\u2014</span></td>'
      : '<td class="colFim"><span class="badge '+(f.pct>=75?'v':(f.pct>=50?'a':'r'))+'">'+f.pct+'%</span><span class="pct">'+f.f+' falta(s)</span></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div>';
  h+='<div class="legenda"><b>Legenda:</b>'
    +'<span><span class="qd" style="background:rgba(43,182,115,.4)"></span>P Presente</span>'
    +'<span><span class="qd" style="background:rgba(225,87,76,.35)"></span>F Falta</span>'
    +'<span><span class="qd" style="background:rgba(232,169,60,.4)"></span>A Atraso/Justif.</span>'
    +'<span style="color:#9aa3a9">Clique pra mudar.</span></div>';
  el.innerHTML=h;
}
function grafico(t,al,W,H){
  var n=t.licoes.length;
  if(n<2) return '<div class="vazio" style="padding:24px">Adicione e marque pelo menos <b>2 li\u00e7\u00f5es</b> pra ver a evolu\u00e7\u00e3o.</div>';
  var padL=38,padR=14,padT=14,padB=30;
  function xF(i){ return padL+(i/(n-1))*(W-padL-padR); }
  function yF(v){ return padT+(1-v/100)*(H-padT-padB); }
  var g='';
  [0,50,100].forEach(function(v){ var y=yF(v); g+='<line x1="'+padL+'" y1="'+y+'" x2="'+(W-padR)+'" y2="'+y+'" stroke="#e6eaed"/>'
    +'<text x="6" y="'+(y+4)+'" font-size="11" fill="#9aa3a9">'+v+'</text>'; });
  var pts=[]; t.licoes.forEach(function(l,i){ var v=(t.desempenho[al]||{})[l.id]; if(v in SCORE) pts.push({x:xF(i),y:yF(SCORE[v])}); });
  var med=[]; t.licoes.forEach(function(l,i){ var s=0,c=0; t.alunos.forEach(function(a){ var v=(t.desempenho[a.id]||{})[l.id]; if(v in SCORE){s+=SCORE[v];c++;} }); if(c) med.push({x:xF(i),y:yF(s/c)}); });
  function path(a){ return a.map(function(p,i){ return (i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1); }).join(' '); }
  if(med.length>1) g+='<path d="'+path(med)+'" fill="none" stroke="#b9c4ca" stroke-width="2" stroke-dasharray="5 5"/>';
  if(pts.length>1) g+='<path d="'+path(pts)+'" fill="none" stroke="#1F7A8C" stroke-width="3"/>';
  pts.forEach(function(p){ g+='<circle cx="'+p.x+'" cy="'+p.y+'" r="4.5" fill="#1F7A8C"/>'; });
  t.licoes.forEach(function(l,i){ g+='<text x="'+xF(i)+'" y="'+(H-10)+'" font-size="10" fill="#9aa3a9" text-anchor="middle">'+(i+1)+'</text>'; });
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:'+W+'px;background:#fafcfc;border:1px solid var(--linha);border-radius:10px">'+g+'</svg>'
    +'<div class="legenda"><span><span class="qd" style="background:#1F7A8C"></span>Este aluno</span>'
    +'<span><span class="qd" style="background:#b9c4ca"></span>M\u00e9dia da turma</span>'
    +'<span style="color:#9aa3a9">Eixo X = n\u00famero da li\u00e7\u00e3o.</span></div>';
}

function renderEvolucao(t){
  var el=document.getElementById('sec-evolucao');
  if(!t.alunos.length){ el.innerHTML=vazioAlunos(); return; }
  if(!ui.evoAluno||!t.alunos.find(function(a){return a.id===ui.evoAluno;})) ui.evoAluno=t.alunos[0].id;
  var h='<div class="subbar"><label style="font-weight:700;font-size:13px">Aluno:</label><select onchange="ui.evoAluno=this.value;render()">';
  t.alunos.forEach(function(a){ h+='<option value="'+a.id+'"'+(a.id===ui.evoAluno?' selected':'')+'>'+a.nome+'</option>'; });
  h+='</select></div>';
  var f=freq(t,ui.evoAluno), ap=aproveitamento(t,ui.evoAluno);
  h+='<div class="resumo"><div class="pill">Aproveitamento <b>'+(ap.pct==null?'\u2014':ap.pct+'%')+'</b></div>'
    +'<div class="pill">Frequ\u00eancia <b>'+(f.pct==null?'\u2014':f.pct+'%')+'</b></div>'
    +'<div class="pill">Faltas <b>'+f.f+'</b></div></div>';
  h+=grafico(t,ui.evoAluno,640,260);
  el.innerHTML=h;
}

function renderComportamento(t){
  var el=document.getElementById('sec-comportamento');
  if(!t.alunos.length){ el.innerHTML=vazioAlunos(); return; }
  if(!ui.compAluno||!t.alunos.find(function(a){return a.id===ui.compAluno;})) ui.compAluno=t.alunos[0].id;
  var h='<div class="subbar"><label style="font-weight:700;font-size:13px">Aluno:</label><select onchange="ui.compAluno=this.value;render()">';
  t.alunos.forEach(function(a){ h+='<option value="'+a.id+'"'+(a.id===ui.compAluno?' selected':'')+'>'+a.nome+'</option>'; });
  h+='</select></div>'
    +'<div class="subbar" style="border:none">'
    +'<select id="notaTipo"><option value="positivo">\u2b50 Positivo</option><option value="atencao">\u26a0\ufe0f Aten\u00e7\u00e3o</option><option value="negativo">\u26d4 Negativo</option></select>'
    +'<input id="notaTxt" placeholder="Anota\u00e7\u00e3o (ex: participou muito bem)" style="flex:1;min-width:260px" onkeydown="if(event.key==='Enter')addNota()">'
    +'<button class="btn" onclick="addNota()">+ Anotar</button>'
    +'</div><div class="notas">';
  var lista=(t.comportamento[ui.compAluno]||[]).slice().reverse();
  if(!lista.length) h+='<div class="vazio" style="padding:20px">Sem anota\u00e7\u00f5es ainda.</div>';
  lista.forEach(function(nt){ h+='<div class="nota '+nt.tipo+'"><span class="data">'+nt.data+'</span>'
    +'<span class="txt">'+nt.txt+'</span><span class="rem" onclick="remNota(''+nt.id+'')">\u2715</span></div>'; });
  h+='</div>';
  el.innerHTML=h;
}

function addNota(){ var t=T(); var al=ui.compAluno; var tipo=document.getElementById('notaTipo').value;
  var txt=document.getElementById('notaTxt').value.trim(); if(!txt)return;
  if(!t.comportamento[al])t.comportamento[al]=[];
  t.comportamento[al].push({id:uid(),data:hoje(),tipo:tipo,txt:txt}); document.getElementById('notaTxt').value='';
  render(); salvar(); }
function remNota(id){ var t=T(); var al=ui.compAluno;
  t.comportamento[al]=(t.comportamento[al]||[]).filter(function(n){return n.id!==id;}); render(); salvar(); }

function renderBoletim(t){
  var el=document.getElementById('sec-boletim');
  if(!t.alunos.length){ el.innerHTML='<div class="painel"><div class="vazio">Adicione alunos pra gerar o boletim.</div></div>'; return; }
  var h='<div class="painel noprint"><div class="subbar" style="border:none;margin:0">'
    +'<label style="font-weight:700;font-size:13px">Aluno:</label>'
    +'<select onchange="ui.boletimAluno=this.value;render()">'
    +'<option value="__todos__"'+(ui.boletimAluno==='__todos__'?' selected':'')+'>Todos os alunos</option>';
  t.alunos.forEach(function(a){ h+='<option value="'+a.id+'"'+(a.id===ui.boletimAluno?' selected':'')+'>'+a.nome+'</option>'; });
  h+='</select><button class="btn" onclick="window.print()">&#128424;&#65039; Imprimir boletim</button>'
    +'<span style="font-size:12px;color:#8a949b">Imprime um por folha.</span></div></div>';
  var alvos = ui.boletimAluno==='__todos__'? t.alunos : t.alunos.filter(function(a){return a.id===ui.boletimAluno;});
  alvos.forEach(function(a){ h+=boletimHTML(t,a); });
  el.innerHTML=h;
}

function boletimHTML(t,al){
  var ap=aproveitamento(t,al.id), f=freq(t,al.id);
  var lic=''; if(t.licoes.length){ lic='<table class="miniTab">'; t.licoes.forEach(function(l){ var v=(t.desempenho[al.id]||{})[l.id]||0;
    lic+='<tr><td>'+l.nome+'</td><td style="text-align:center;width:60px">'+['\u2014','\u2713 Concluiu','\u25d0 Em parte','\u2715 N\u00e3o fez'][v]+'</td></tr>'; }); lic+='</table>'; }
  else lic='<p style="color:#8a949b;font-size:13px">Nenhuma li\u00e7\u00e3o cadastrada.</p>';
  var notas=(t.comportamento[al.id]||[]);
  var comp=''; if(notas.length){ comp='<div class="notas">'; notas.slice().reverse().forEach(function(n){
    comp+='<div class="nota '+n.tipo+'"><span class="data">'+n.data+'</span><span class="txt">'+n.txt+'</span></div>'; }); comp+='</div>'; }
  else comp='<p style="color:#8a949b;font-size:13px">Sem anota\u00e7\u00f5es.</p>';
  return '<div class="boletim">'
    +'<h2>Boletim de Acompanhamento</h2>'
    +'<div class="meta"><b>'+al.nome+'</b> &nbsp;&middot;&nbsp; '+t.nome+' &nbsp;&middot;&nbsp; Emitido em '+hoje()+(dados.professor?' &nbsp;&middot;&nbsp; Prof. '+dados.professor:'')+'</div>'
    +'<div class="bloco"><h4>Desempenho nas li\u00e7\u00f5es</h4>'+lic
    +'<p style="margin-top:8px"><b>Aproveitamento:</b> '+(ap.pct==null?'\u2014':ap.pct+'% ')+'<span class="badge '+(ap.cls||'n')+'">'+(ap.txt||'\u2014')+'</span></p></div>'
    +'<div class="bloco"><h4>Frequ\u00eancia</h4>'
    +'<p>Presen\u00e7as: <b>'+f.p+'</b> &nbsp;|&nbsp; Faltas: <b>'+f.f+'</b> &nbsp;|&nbsp; Atrasos/Justif.: <b>'+f.a+'</b> &nbsp;|&nbsp; Frequ\u00eancia: <b>'+(f.pct==null?'\u2014':f.pct+'%')+'</b></p></div>'
    +'<div class="bloco"><h4>Evolu\u00e7\u00e3o nas li\u00e7\u00f5es</h4>'+grafico(t,al.id,640,240)+'</div>'
    +'<div class="bloco"><h4>Comportamento</h4>'+comp+'</div>'
    +'<div class="assinatura"><div>'+(dados.professor||'Professor(a)')+'<br><small>Professor(a)</small></div><div>'+hoje()+'<br><small>Data</small></div></div>'
    +'</div>';
}

function baixarBackup(){ var b=new Blob([JSON.stringify(dados,null,2)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='painel-professor-backup.json'; a.click(); URL.revokeObjectURL(a.href); }
function abrirBackup(ev){ var f=ev.target.files[0]; if(!f)return; var r=new FileReader();
  r.onload=function(){ try{ var d=JSON.parse(r.result); if(d.turmas){ dados=d; dados.turmas.forEach(migra); if(dados.atual==null&&dados.turmas.length)dados.atual=dados.turmas[0].id; render(); salvar(); alert('Backup carregado!'); } else alert('Arquivo inv\u00e1lido.'); }catch(e){ alert('N\u00e3o consegui ler o arquivo.'); } };
  r.readAsText(f); ev.target.value=''; }

(async function(){ await carregar(); dados.turmas.forEach(migra); render(); })();
</script>
</body>
</html>
